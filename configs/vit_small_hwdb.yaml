# Model  (type: "vit" 或 "resnet")
model:
  type: "resnet"       # ← 切换模型: "vit" / "resnet"
  image_size: 112
  patch_size: 8        # 仅 ViT 使用
  in_channels: 1
  hidden_dim: 384
  num_layers: 6
  num_heads: 6
  mlp_ratio: 4
  num_classes: 3490
  dropout: 0.1

# Training
train:
  batch_size: 128
  epochs: 50
  lr: 0.0003
  weight_decay: 0.05
  warmup_epochs: 5
  label_smoothing: 0.1
  grad_accum_steps: 1

# Data
data:
  hdf5_path: "data/processed/hwdb_fast.h5"
  num_workers: 4
