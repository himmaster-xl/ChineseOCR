# Model
model:
  image_size: 112
  patch_size: 4
  in_channels: 1
  hidden_dim: 384
  num_layers: 12
  num_heads: 6
  mlp_ratio: 4
  num_classes: 3490
  dropout: 0.1

# Training
train:
  batch_size: 32
  epochs: 100
  lr: 0.0003
  weight_decay: 0.05
  warmup_epochs: 10
  label_smoothing: 0.1
  grad_accum_steps: 4

# Data
data:
  hdf5_path: "data/processed/hwdb.h5"
  num_workers: 4
