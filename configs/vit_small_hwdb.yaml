# Model  (patch=8 → 197 tokens, 注意力快16倍; 6层训练更快)
model:
  image_size: 112
  patch_size: 8
  in_channels: 1
  hidden_dim: 384
  num_layers: 6
  num_heads: 6
  mlp_ratio: 4
  num_classes: 3490
  dropout: 0.1

# Training
train:
  batch_size: 64
  epochs: 100
  lr: 0.0003
  weight_decay: 0.05
  warmup_epochs: 10
  label_smoothing: 0.1
  grad_accum_steps: 2

# Data
data:
  hdf5_path: "data/processed/hwdb.h5"
  num_workers: 4
